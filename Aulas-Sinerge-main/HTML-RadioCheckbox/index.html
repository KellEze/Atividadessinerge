<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lanchonete - Select + Checkbox + Radio</title>
  <script src="index.js" defer></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 32px; background: #f5f5f5; }
    h1 { margin-bottom: 20px; }
    form { background: #fff; padding: 20px; border-radius: 8px; max-width: 520px; }
    .row { margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
    label { font-weight: 600; }
    input[type="number"] { padding: 8px; width: 180px; }
    select { padding: 8px; width: 280px; }
    .inline { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .block { margin-top: 18px; padding-top: 10px; border-top: 1px solid #eee; }
    .result { margin-top: 12px; background: #f0f7ff; padding: 10px 12px; border-radius: 6px; min-height: 22px; }
    button { padding: 10px 14px; border: 0; border-radius: 6px; background: #222; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Lanchonete</h1>

  <form>
    <div class="row">
      <label for="produto">Produto</label>
      <select id="produto">
        <option value="">Selecione um produto</option>
        <option value="6.00">Coxinha</option>
        <option value="8.00">Suco</option>
        <option value="4.00">Pão de queijo</option>
        <option value="7.00">Refrigerante</option>
        <option value="15.00">Sanduíche</option>
      </select>
    </div>

    <div class="row">
      <label for="preco">Preço</label>
      <input type="number" id="preco" readonly />
    </div>

    <div class="row">
      <label for="quantidade">Quantidade</label>
      <input type="number" id="quantidade" min="0" step="1" />
    </div>

    <div class="row">
      <label for="total">Total</label>
      <input type="number" id="total" readonly />
    </div>

    <div class="block">
      <h3>Informações adicionais</h3>

      <label class="inline">
        <input type="checkbox" value="Pago" class="info-adicional" />
        Pago
      </label>
      <br />

      <label class="inline">
        <input type="checkbox" value="Entregue" class="info-adicional" />
        Entregue
      </label>
      <br />

      <label class="inline">
        <input type="checkbox" value="Para viagem" class="info-adicional" />
        Para viagem
      </label>
      <br />

      <label class="inline">
        <input type="checkbox" value="Pedido urgente" class="info-adicional" />
        Pedido urgente
      </label>
      <br />

      <!-- Desafio 1 -->
      <label class="inline">
        <input type="checkbox" value="Com desconto" class="info-adicional" />
        Com desconto
      </label>

      <p id="resultado-info" class="result"></p>
    </div>

    <div class="block">
      <h3>Forma de pagamento</h3>

      <label class="inline">
        <input type="radio" name="pagamento" value="Dinheiro" />
        Dinheiro
      </label>
      <br />

      <label class="inline">
        <input type="radio" name="pagamento" value="Pix" />
        Pix
      </label>
      <br />

      <label class="inline">
        <input type="radio" name="pagamento" value="Cartão" />
        Cartão
      </label>
      <br />

      <label class="inline">
        <input type="radio" name="pagamento" value="Fiado" />
        Fiado
      </label>
      <br />

      <!-- Desafio 2 -->
      <label class="inline">
        <input type="radio" name="pagamento" value="Vale-lanche" />
        Vale-lanche
      </label>

      <p id="resultado-pagamento" class="result"></p>
    </div>

    <div class="block">
      <button type="button" id="btn-resumo">Mostrar resumo no console</button>
    </div>
  </form>
</body>
</html>
